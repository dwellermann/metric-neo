name: Super Linux Build (DEB, RPM, Arch)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    name: Build ${{ matrix.target_name }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false  # <--- HIER EINFÜGEN
      matrix:
        include:
          - target_name: "Legacy-Debian-Ubuntu"
            webkit_tag: ""
            formats: "deb"
          - target_name: "Modern-Fedora-Arch"
            webkit_tag: "-tags webkit2gtk_4.1"
            formats: "rpm pacman"

    # Hier setzen wir das Arbeitsverzeichnis für alle Schritte auf software/
    defaults:
      run:
        working-directory: software

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev \
            build-essential ruby-dev gcc make file binutils jq \
            libarchive-tools  # <--- DIESES PAKET ERMÖGLICHT ARCH-BUILDS

      - name: Install FPM
        run: sudo gem install fpm

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Wails Build
        run: |
          # Pfad zum Go-Bin-Verzeichnis hinzufügen
          export PATH=$PATH:$(go env GOPATH)/bin
          # Build ausführen (erzeugt das Binary in software/build/bin/)
          wails build ${{ matrix.webkit_tag }} -o metric-neo

      - name: Packaging with FPM
        run: |
          # 1. Version sicher aus wails.json extrahieren
          # Wir prüfen .info.productVersion (Wails Standard) und .version
          VERSION=$(jq -r '.info.productVersion // .version // "1.0.0"' wails.json)
          if [ "$VERSION" == "null" ]; then VERSION="1.0.0"; fi
          echo "Building Version: $VERSION"

          # 2. Pfade definieren (Relativ zum 'software' Ordner)
          BINARY="build/bin/metric-neo"
          DESKTOP="metric-neo.desktop"
          ICON_SOURCE="appicon.png"

          # 3. Sicherheits-Check: Existieren die Dateien?
          if [ ! -f "$BINARY" ]; then echo "Fehler: Binary $BINARY nicht gefunden!"; exit 1; fi
          if [ ! -f "$DESKTOP" ]; then echo "Fehler: Desktop-Datei $DESKTOP nicht gefunden!"; exit 1; fi
          if [ ! -f "$ICON_SOURCE" ]; then echo "Fehler: Icon $ICON_SOURCE nicht gefunden!"; exit 1; fi

          # 4. Gemeinsame Datei-Mappings für FPM (Quelle=Ziel)
          # Wir benennen das Icon im Zielsystem 'metric-neo.png', damit es zur Desktop-Datei passt
          FILES="$BINARY=/usr/bin/metric-neo \
                 $DESKTOP=/usr/share/applications/metric-neo.desktop \
                 $ICON_SOURCE=/usr/share/icons/hicolor/256x256/apps/metric-neo.png"

          # 5. Die Pakete bauen (basierend auf der Matrix-Konfiguration)

          # --- DEBIAN / UBUNTU (.deb) ---
          if [[ "${{ matrix.formats }}" == *"deb"* ]]; then
            echo "Erstelle .deb Paket..."
            fpm -s dir -t deb \
              -n metric-neo \
              -v "$VERSION" \
              -d "libwebkit2gtk-4.0-37" \
              -d "libgtk-3-0" \
              --description "Metric Neo Serial Communication Tool" \
              $FILES
          fi

          # --- FEDORA (.rpm) ---
          if [[ "${{ matrix.formats }}" == *"rpm"* ]]; then
            echo "Erstelle .rpm Paket..."
            fpm -s dir -t rpm \
              -n metric-neo \
              -v "$VERSION" \
              -d "webkit2gtk4.1" \
              -d "gtk3" \
              --description "Metric Neo Serial Communication Tool" \
              $FILES
          fi

          # --- ARCH LINUX (.pkg.tar.zst) ---
          if [[ "${{ matrix.formats }}" == *"pacman"* ]]; then
            echo "Erstelle .pacman Paket..."
            fpm -s dir -t pacman \
              -n metric-neo \
              -v "$VERSION" \
              -d "webkit2gtk-4.1" \
              -d "gtk3" \
              --description "Metric Neo Serial Communication Tool" \
              $FILES
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          # Wir machen den Namen absolut eindeutig pro Matrix-Lauf
          name: metric-neo-package-${{ matrix.target_name }}-${{ github.run_id }}
          path: |
            software/*.deb
            software/*.rpm
            software/*.pkg.tar.zst
          # Das hier verhindert, dass der Build als "Erfolg" gewertet wird,
          # wenn gar keine Dateien erzeugt wurden (hilft beim Debuggen)
          if-no-files-found: error
          # Optional: Wie lange die Dateien auf GitHub gespeichert werden (Standard 90 Tage)
          retention-days: 5
