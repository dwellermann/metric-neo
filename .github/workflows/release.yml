name: Super Linux Build (DEB, RPM, Arch)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    name: Build ${{ matrix.target_name }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: "Legacy-Debian-Ubuntu"
            is_modern: false
            formats: "deb"
          - target_name: "Modern-Fedora-Arch"
            is_modern: true
            formats: "rpm pacman"

    defaults:
      run:
        working-directory: software

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev \
            build-essential ruby-dev gcc make file binutils jq \
            libarchive-tools

      - name: Install FPM
        run: sudo gem install fpm

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Wails Build
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          # Wir räumen den bin-Ordner komplett leer
          mkdir -p build/bin
          rm -rf build/bin/*

          if [ "${{ matrix.is_modern }}" = "true" ]; then
            echo "STARTING MODERN BUILD (WebKit 4.1)"
            wails build -clean -tags webkit2gtk_4.1 -o metric-neo-modern
          else
            echo "STARTING LEGACY BUILD (WebKit 4.0)"
            wails build -clean -o metric-neo-legacy
          fi

      - name: Packaging with FPM
        run: |
          # 1. Version aus wails.json lesen
          VERSION=$(jq -r '.info.productVersion // .version // "1.0.0"' wails.json)
          if [ "$VERSION" == "null" ] || [ -z "$VERSION" ]; then VERSION="1.0.0"; fi
          echo "Verpacke Version: $VERSION"

          # 2. DYNAMISCHE SUCHE: Wir finden das Binary im bin-Ordner, egal wie es heißt
          BINARY_SOURCE=$(find build/bin/ -type f -executable | head -n 1)
          echo "Gefundenes Binary: $BINARY_SOURCE"

          # 3. ANALYSE (Damit wir im Log sehen, ob es 4.0 oder 4.1 ist)
          echo "--- LDD CHECK ---"
          ldd $BINARY_SOURCE | grep webkit
          echo "-----------------"

          # 4. Dateien definieren (Icon und Desktop liegen direkt in /software)
          DESKTOP="metric-neo.desktop"
          ICON="appicon.png"

          # 5. Mapping für FPM (Quelle=Ziel)
          FILES="$BINARY_SOURCE=/usr/bin/metric-neo \
                 $DESKTOP=/usr/share/applications/metric-neo.desktop \
                 $ICON=/usr/share/icons/hicolor/256x256/apps/metric-neo.png"

          # 6. Pakete bauen
          if [[ "${{ matrix.formats }}" == *"deb"* ]]; then
            fpm -s dir -t deb -n metric-neo -v "$VERSION" -d "libwebkit2gtk-4.0-37" -d "libgtk-3-0" --description "Metric Neo Tool" $FILES
          fi

          if [[ "${{ matrix.formats }}" == *"rpm"* ]]; then
            fpm -s dir -t rpm -n metric-neo -v "$VERSION" -d "webkit2gtk4.1" -d "gtk3" --description "Metric Neo Tool" $FILES
          fi

          if [[ "${{ matrix.formats }}" == *"pacman"* ]]; then
            fpm -s dir -t pacman -n metric-neo -v "$VERSION" -d "webkit2gtk-4.1" -d "gtk3" --description "Metric Neo Tool" $FILES
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: metric-neo-package-${{ matrix.target_name }}
          path: |
            software/*.deb
            software/*.rpm
            software/*.pkg.tar.zst
          if-no-files-found: error
          retention-days: 5
