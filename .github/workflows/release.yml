name: Super Linux Build (DEB, RPM, Arch)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    name: Build ${{ matrix.target_name }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - target_name: "Legacy-Debian-Ubuntu"
            webkit_tag: "" 
            formats: "deb"
          - target_name: "Modern-Fedora-Arch"
            webkit_tag: "-tags webkit2gtk_4.1"
            formats: "rpm pacman"

    # Hier setzen wir das Arbeitsverzeichnis für alle Schritte auf software/
    defaults:
      run:
        working-directory: software

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Build Dependencies
        # Abhängigkeiten müssen auf Systemebene installiert werden (kein working-dir nötig, aber schadet nicht)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev build-essential ruby-dev gcc make file binutils

      - name: Install FPM
        run: sudo gem install fpm

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Wails Build
        run: |
          # Pfad zum Go-Bin-Verzeichnis hinzufügen
          export PATH=$PATH:$(go env GOPATH)/bin
          # Build ausführen (erzeugt das Binary in software/build/bin/)
          wails build ${{ matrix.webkit_tag }} -o metric-neo

      - name: Packaging with FPM
        run: |
          # Version aus wails.json extrahieren (wir sind bereits in /software)
          VERSION=$(grep '"version":' wails.json | cut -d '"' -f 4)
          
          # Pfade zu den Dateien innerhalb des software-Ordners
          # FPM nimmt Pfade relativ zum aktuellen Arbeitsverzeichnis
          FILES="build/bin/metric-neo=/usr/bin/metric-neo \
                 build/bin/metric-neo.desktop=/usr/share/applications/metric-neo.desktop \
                 build/appicon.png=/usr/share/icons/hicolor/256x256/apps/metric-neo.png"

          # DEB bauen
          if [[ "${{ matrix.formats }}" == *"deb"* ]]; then
            fpm -s dir -t deb -n metric-neo -v $VERSION -d "libwebkit2gtk-4.0-37" -d "libgtk-3-0" $FILES
          fi

          # RPM bauen
          if [[ "${{ matrix.formats }}" == *"rpm"* ]]; then
            fpm -s dir -t rpm -n metric-neo -v $VERSION -d "webkit2gtk4.1" -d "gtk3" $FILES
          fi

          # Pacman bauen
          if [[ "${{ matrix.formats }}" == *"pacman"* ]]; then
            fpm -s dir -t pacman -n metric-neo -v $VERSION -d "webkit2gtk-4.1" -d "gtk3" $FILES
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: metric-neo-${{ matrix.target_name }}
          # Pfad relativ zum Repo-Root (daher software/*.xxx)
          path: |
            software/*.deb
            software/*.rpm
            software/*.pkg.tar.zst
