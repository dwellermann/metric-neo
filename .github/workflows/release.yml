name: Super Linux Build (DEB, RPM, Arch)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # --- WELT 1: DEBIAN / UBUNTU ---
  build-debian:
    name: Build .deb (Ubuntu/Debian)
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: software
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential ruby-dev jq
          sudo gem install fpm
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build & Pack
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          wails build -clean -o metric-neo
          VERSION=$(jq -r '.info.productVersion // .version // "1.0.0"' wails.json)
          fpm -s dir -t deb -n metric-neo -v "$VERSION" -d "libwebkit2gtk-4.0-37" -d "libgtk-3-0" \
            build/bin/metric-neo=/usr/bin/metric-neo \
            metric-neo.desktop=/usr/share/applications/metric-neo.desktop \
            appicon.png=/usr/share/icons/hicolor/256x256/apps/metric-neo.png
      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: metric-neo-deb
          path: software/*.deb

  # --- WELT 2: FEDORA / ARCH ---
  build-fedora:
    name: Build .rpm / .pacman (Fedora/Arch)
    runs-on: ubuntu-latest
    container:
      image: fedora:40 # Wir bauen DIREKT in Fedora
    defaults:
      run:
        working-directory: software
    steps:
      - uses: actions/checkout@v4
      - name: Install Fedora Deps
        run: |
          dnf install -y go-toolset nodejs npm webkit2gtk4.1-devel gtk3-devel \
          gcc-c++ ruby-devel rpm-build rubygems jq libarchive-devel libarchive
          gem install fpm
          export PATH=$PATH:$(go env GOPATH)/bin
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build & Pack
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          # Hier MUSS er 4.1 nehmen, da es 4.0 in Fedora 40 nicht gibt!
          wails build -clean -tags webkit2gtk_4.1 -o metric-neo
          
          # LDD CHECK (Nur zur Sicherheit im Log)
          ldd build/bin/metric-neo | grep webkit
          
          VERSION=$(jq -r '.info.productVersion // .version // "1.0.0"' wails.json)
          FILES="build/bin/metric-neo=/usr/bin/metric-neo \
                 metric-neo.desktop=/usr/share/applications/metric-neo.desktop \
                 appicon.png=/usr/share/icons/hicolor/256x256/apps/metric-neo.png"
          
          # RPM für Fedora
          fpm -s dir -t rpm -n metric-neo -v "$VERSION" -d "webkit2gtk4.1" -d "gtk3" $FILES
          # Pacman für Arch (nutzt bsdtar von Fedora)
          fpm -s dir -t pacman -n metric-neo -v "$VERSION" -d "webkit2gtk-4.1" -d "gtk3" $FILES
      - name: Upload RPM/Arch
        uses: actions/upload-artifact@v4
        with:
          name: metric-neo-rpm-arch
          path: |
            software/*.rpm
            software/*.pkg.tar.zst
